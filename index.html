<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reativação Supervisores · 91–365 dias</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f7;--bg2:#e8eaf2;--bg3:#dde0ec;--card:#ffffff;--card2:#f7f8fc;--card3:#eef0f8;
  --border:#d0d5e8;--border2:#c2c8e0;--azul:#1971c2;--azul2:#1c7ed6;--laranja:#e67700;
  --laranja2:#f76707;--vermelho:#c92a2a;--verde:#2b8a3e;--verde2:#37b24d;
  --text:#1a1d2e;--text2:#495057;--text3:#868e96;--text-dim:#adb5bd;
  --atencao:#e67700;--critico:#f76707;--perdido:#c92a2a;
  --shadow:0 2px 12px rgba(0,0,0,0.10);--shadow2:0 4px 20px rgba(0,0,0,0.14);
}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}

.topbar{background:linear-gradient(90deg,#1a1d2e 0%,#1c2340 60%,#1a1d2e 100%);border-bottom:3px solid var(--laranja);height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,0.18);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.logo{background:var(--laranja);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;letter-spacing:2px;padding:5px 13px;border-radius:5px;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:0.5px;}
.topbar-subtitle{font-size:11px;color:#adb5bd;margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:20px;}
.reports-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin:16px 0 18px;}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:0 4px 14px rgba(0,0,0,.05);}
.report-card h3{font-size:14px;margin:0 0 10px;color:var(--text);}
.report-table{width:100%;border-collapse:collapse;}
.report-table td,.report-table th{padding:6px 4px;border-bottom:1px solid var(--border2);font-size:12px;text-align:left;color:var(--text2);}
.report-table th{color:var(--text);font-weight:700;}
.report-pill{display:inline-block;padding:3px 8px;border-radius:999px;background:var(--bg3);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text2);margin-right:6px;}
.topbar-stat{text-align:right;}
.topbar-stat .val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;color:#4dabf7;}
.topbar-stat .lbl{font-size:11px;color:#868e96;text-transform:uppercase;letter-spacing:0.5px;}
.topbar-divider{width:1px;height:32px;background:#2d3d65;}

.tabs-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 28px;gap:4px;box-shadow:var(--shadow);}
.tab-btn{padding:14px 22px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:.15s;letter-spacing:0.3px;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.ativo{color:var(--azul);border-bottom-color:var(--azul);}
.tab-btn.ativo.verde{color:var(--verde);border-bottom-color:var(--verde);}
.tab-count{display:inline-block;background:var(--bg3);color:var(--text3);border-radius:10px;font-size:11px;font-weight:700;padding:1px 8px;margin-left:6px;}
.tab-btn.ativo .tab-count{background:var(--azul);color:#fff;}
.tab-btn.ativo.verde .tab-count{background:var(--verde);color:#fff;}

.dash{padding:24px 28px 0;}
.kpi-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:14px;margin-bottom:22px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 22px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
.kpi.total::after{background:var(--azul);}
.kpi.atencao::after{background:var(--atencao);}
.kpi.critico::after{background:var(--critico);}
.kpi.perdido::after{background:var(--perdido);}
.kpi.verde-kpi::after{background:var(--verde);}
.kpi-icon{font-size:22px;margin-bottom:10px;display:block;}
.kpi-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;margin-bottom:6px;}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;line-height:1;margin-bottom:4px;}
.kpi.total .kpi-val{color:var(--azul);font-size:22px;}
.kpi.atencao .kpi-val{color:var(--atencao);}
.kpi.critico .kpi-val{color:var(--critico);}
.kpi.perdido .kpi-val{color:var(--perdido);}
.kpi.verde-kpi .kpi-val{color:var(--verde);}
.kpi-sub{font-size:12px;color:var(--text2);}
.kpi-sub strong{color:var(--text);}
.kpi-fat-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;color:var(--laranja);margin:4px 0;}

.filtros-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px;box-shadow:var(--shadow);}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:9px 14px 9px 38px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:.2s;}
.search-wrap input:focus{border-color:var(--azul2);background:#fff;}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
.sep{width:1px;height:28px;background:var(--border2);flex-shrink:0;}
.btn-grupo{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap;}
.btn-grupo:hover{border-color:var(--azul);color:var(--azul);background:#e8f1fb;}
.btn-grupo.ativo{background:var(--azul);color:#fff;border-color:var(--azul);}
.btn-grupo.atencao.ativo{background:var(--atencao);border-color:var(--atencao);color:#fff;}
.btn-grupo.critico.ativo{background:var(--critico);border-color:var(--critico);color:#fff;}
.btn-grupo.perdido.ativo{background:var(--perdido);border-color:var(--perdido);color:#fff;}
.sup-filter{display:flex;align-items:center;gap:8px;}
.sup-filter label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.sup-select{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;outline:none;cursor:pointer;transition:.2s;}
.sup-select:focus{border-color:var(--azul2);}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:32px;box-shadow:var(--shadow);}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);background:var(--card2);}
.table-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--text);}
.table-count{font-size:12px;color:var(--text3);font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);padding:11px 16px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--border2);white-space:nowrap;}
th:first-child{padding-left:22px;}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px;}
td:first-child{padding-left:22px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--card3);cursor:pointer;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;white-space:nowrap;}
.badge-atencao{background:#fff3cd;color:#e67700;border:1px solid #ffc107;}
.badge-critico{background:#ffe0cc;color:#f76707;border:1px solid #fd7e14;}
.badge-perdido{background:#ffe0e0;color:#c92a2a;border:1px solid #e03131;}
.badge-uf{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.badge-sup{background:#e3f0ff;color:#1971c2;border:1px solid #a5c8f5;font-size:10px;}
.badge-reativado{background:#d3f9d8;color:#2b8a3e;border:1px solid #8ce99a;}

.cli-nome{font-weight:700;color:var(--text);font-size:13px;}
.cli-cod{font-size:11px;color:var(--text3);margin-top:2px;}
.cli-fantasia{font-size:11px;color:var(--text3);font-style:italic;}
.val-money{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--laranja2);}
.val-dias{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;}
.val-dias.atencao{color:var(--atencao);}
.val-dias.critico{color:var(--critico);}
.val-dias.perdido{color:var(--perdido);}
.btn-ver{padding:6px 14px;border-radius:6px;background:var(--azul);color:#fff;border:none;font-family:'Barlow',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:.15s;}
.btn-ver:hover{background:var(--azul2);transform:translateY(-1px);}
.btn-ver.verde-btn{background:var(--verde);}
.btn-ver.verde-btn:hover{background:var(--verde2);}

.empty-state{padding:60px 20px;text-align:center;color:var(--text3);}
.empty-state .emoji{font-size:40px;margin-bottom:12px;}

/* MODAL */
#ov{position:fixed;inset:0;background:rgba(15,20,40,0.65);z-index:300;display:none;overflow-y:auto;padding:24px;}
#ov.show{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:860px;box-shadow:0 8px 40px rgba(0,0,0,0.28);overflow:hidden;margin:auto;}
.modal-header{background:linear-gradient(135deg,#1a1d2e 0%,#1c2d55 100%);padding:22px 28px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--laranja);}
.modal-header.reativado{border-bottom-color:var(--verde);}
.modal-cli-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:#fff;letter-spacing:0.5px;}
.modal-cli-fantasia{font-size:13px;color:#adb5bd;margin-top:2px;}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.modal-close{background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:18px;width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.modal-close:hover{background:rgba(255,255,255,0.2);}
.modal-body{padding:22px 28px 28px;display:flex;flex-direction:column;gap:20px;}

.bloco-titulo{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.bloco-icon{font-size:18px;}
.bloco-nome{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;color:var(--text);letter-spacing:0.3px;}
.bloco-rule{flex:1;height:1px;background:var(--border);}

/* Contact grid */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.contact-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;}
.contact-icon{font-size:20px;flex-shrink:0;}
.contact-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);font-weight:700;}
.contact-val{font-size:13px;font-weight:600;color:var(--text);margin-top:1px;}
.contact-val a{color:var(--azul2);text-decoration:none;}
.contact-val a:hover{text-decoration:underline;}

/* Status tags in header */
.status-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.stag{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e0e6f0;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.3px;}
.stag.critico{background:rgba(247,103,7,0.25);border-color:rgba(247,103,7,0.5);color:#ffb38a;}
.stag.atencao{background:rgba(230,119,0,0.25);border-color:rgba(230,119,0,0.5);color:#ffd08a;}
.stag.perdido{background:rgba(201,42,42,0.25);border-color:rgba(201,42,42,0.5);color:#ffaaaa;}

/* Fin grid */
.fin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.fin-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;}
.fin-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--laranja2);}
.fin-val.azul{color:var(--azul);}
.fin-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}

/* Prod table */
.prod-table{width:100%;border-collapse:collapse;}
.prod-table th{background:var(--bg3);padding:9px 12px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.prod-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.prod-table tr:last-child td{border-bottom:none;}
.prod-table tr:hover td{background:var(--card3);}
.rank-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;}
.sku{background:var(--bg3);border:1px solid var(--border2);padding:2px 8px;border-radius:4px;font-family:monospace;font-size:11px;color:var(--text2);}

/* Mix categorias */
.mix-grid{display:flex;gap:16px;}
.mix-bars{flex:1;}
.mix-bar-row{margin-bottom:10px;}
.mix-bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;font-weight:600;color:var(--text2);}
.mix-bar-label .pct{color:var(--azul2);font-weight:800;font-family:'Barlow Condensed',sans-serif;font-size:13px;}
.mix-bar-track{background:var(--bg3);border-radius:4px;height:10px;overflow:hidden;}
.mix-bar-fill{height:100%;border-radius:4px;transition:width 0.3s;}
.mix-donut{width:110px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.mix-donut svg{transform:rotate(-90deg);}
.mix-donut-lbl{font-size:10px;color:var(--text3);text-align:center;font-weight:600;text-transform:uppercase;}
.mix-sugestao{background:#fffbe6;border:1px solid #ffe066;border-radius:8px;padding:10px 14px;font-size:12px;color:#6b5900;margin-top:8px;}
.mix-sugestao strong{color:#e67700;}

/* Followups */
.followup-section{display:flex;flex-direction:column;gap:14px;}
.fu-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;}
.fu-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;gap:12px;}
.fu-obs{font-size:13px;color:var(--text);}
.fu-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.fu-tag{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--text2);font-weight:600;}
.fu-date{font-size:11px;color:var(--text3);white-space:nowrap;font-weight:600;}
.fu-empty{padding:16px;text-align:center;color:var(--text-dim);font-size:13px;}
.form-divider{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-full{margin-bottom:12px;}
label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);display:block;margin-bottom:4px;}
input[type=text],input[type=date],select,textarea{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--azul2);background:#fff;}
textarea{resize:vertical;min-height:72px;}
.btns-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.btn-primary{padding:10px 20px;border-radius:8px;background:var(--azul);color:#fff;border:none;font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--azul2);}
.btn-outline{padding:10px 18px;border-radius:8px;background:var(--bg2);color:var(--text2);border:1.5px solid var(--border2);font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:.15s;}
.btn-outline:hover{border-color:var(--azul);color:var(--azul);}
.btn-wpp{padding:10px 18px;border-radius:8px;background:#25d366;color:#fff;border:none;font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:.15s;}
.btn-wpp:hover{background:#1ebe5a;}

/* Reativação */
.reativ-form{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.reativ-form .form-grid-2{margin-bottom:0;}
.btn-rm{background:#ffe0e0;color:var(--vermelho);border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-rm:hover{background:#f5b7b7;}
.reativado-banner{background:#d3f9d8;border:1px solid #8ce99a;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.reativado-banner .rb-icon{font-size:24px;}
.reativado-banner .rb-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:#2b8a3e;}
.reativado-banner .rb-sub{font-size:12px;color:#2f9e44;margin-top:2px;}

/* Msg box */
.msg-box{background:#f8f9fa;border:1.5px solid var(--border2);border-radius:8px;padding:14px 16px;font-size:13px;color:var(--text);white-space:pre-line;line-height:1.6;}

#toast{position:fixed;bottom:24px;right:28px;z-index:999;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.2);transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.ok{background:#2b8a3e;color:#fff;}
#toast.err{background:#c92a2a;color:#fff;}

#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;}
.spinner{width:40px;height:40px;border:4px solid var(--border2);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .kpi-row{grid-template-columns:1fr 1fr;}
  .fin-grid{grid-template-columns:1fr 1fr;}
  .contact-grid{grid-template-columns:1fr;}
  .form-grid-2{grid-template-columns:1fr;}
  .mix-grid{flex-direction:column;}
  .dash{padding:16px;}
  .topbar{padding:0 16px;}
  .tabs-bar{padding:0 16px;overflow-x:auto;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">SM</div>
    <div>
      <div class="topbar-title">Reativação Supervisores</div>
      <div class="topbar-subtitle">Clientes sem compra entre 91 e 365 dias</div>
    </div>
  </div>
  <div class="topbar-right">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-right:12px">
      <button id="btnSyncCloud" class="btn">☁️ Sincronizar Sheets</button>
      <button id="btnImportarLocais" class="btn">📥 Importar p/ Sheets</button>
      <button id="btnExportarFollows" class="btn">📤 Exportar follows</button>
    </div>
    <div class="topbar-stat">
      <div class="val" id="tn">–</div>
      <div class="lbl">Inativos</div>
    </div>
    <div class="topbar-divider"></div>
    <div class="topbar-stat">
      <div class="val" id="tr" style="color:#37b24d">–</div>
      <div class="lbl">Reativados</div>
    </div>

const S={clientes:[],busca:'',grupo:'todos',supervisor:'todos',aba:'inativos',followups:{},agendamentos:{},reativados:{},aberto:null,_formState:null,reportFrom:'',reportTo:''};

const REMOTE_CFG={
  gsUrl:'https://script.google.com/macros/s/AKfycbzUj3pgEiNoaYyCQlqbeHOAdUPjxghP0FD-W5bML8hjvpQIUMfprmWrwzhTo4yonS6nwg/exec',
  enabled:true
};

function getRemotePayload(){
  return {followups:S.followups||{},agendamentos:S.agendamentos||{},reativados:S.reativados||{},updatedAt:new Date().toISOString()};
}
function mergeRemotePayload(d){
  if(!d||typeof d!=='object')return;
  S.followups=d.followups||S.followups||{};
  S.agendamentos=d.agendamentos||S.agendamentos||{};
  S.reativados=d.reativados||S.reativados||{};
}
function ensureGsUrl(){
  if(!REMOTE_CFG.enabled) return false;
  if(!REMOTE_CFG.gsUrl || REMOTE_CFG.gsUrl==='COLE_AQUI_SUA_URL_DO_APPS_SCRIPT'){
    alert('Configure a URL do Google Apps Script em REMOTE_CFG.gsUrl antes de sincronizar.');
    return false;
  }
  return true;
}
async function remoteGetFile(){
  if(!ensureGsUrl()) return null;
  const res=await fetch(REMOTE_CFG.gsUrl,{method:'GET'});
  if(!res.ok) throw new Error('Falha ao ler base remota');
  return await res.json();
}
async function remoteSaveFile(payload,msg){
  if(!ensureGsUrl()) return null;
  const res=await fetch(REMOTE_CFG.gsUrl,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({
      action:'save_full_state',
      message:msg||'Sincroniza follow-ups do supervisor',
      payload
    })
  });
  if(!res.ok) throw new Error('Falha ao salvar base remota');
  return await res.json().catch(()=>({ok:true}));
}
async function syncToCloud(showToastMsg=true){
  const payload=getRemotePayload();
  await remoteSaveFile(payload,'Sincroniza follow-ups do supervisor');
  if(showToastMsg&&typeof toast==='function')toast('Dados sincronizados com Google Sheets');
}
async function loadFromCloud(){
  if(!ensureGsUrl()) return false;
  const d=await remoteGetFile();
  if(!d) return false;
  mergeRemotePayload(d.payload||d);
  saveLS();
  return true;
}
function exportFollowupsJSON(){
  const blob=new Blob([JSON.stringify(getRemotePayload(),null,2)],{type:'application/json;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`followups-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
async function importarLocalParaCloud(){
  if(!ensureGsUrl()) return;
  let remoto = null;
  try{ remoto = await remoteGetFile(); }catch(e){ remoto = null; }
  const payloadRemoto = (remoto&& (remoto.payload||remoto)) || {};
  const rf=((payloadRemoto&&payloadRemoto.followups)||{}), lf=(S.followups||{});
  const followups={...rf};
  Object.keys(lf).forEach(id=>{
    const base=Array.isArray(rf[id])?rf[id]:[];
    const seen=new Set(base.map(f=>[f.data,f.tipo,f.resultado,f.resp,f.obs].join('|')));
    const add=(Array.isArray(lf[id])?lf[id]:[]).filter(f=>{const k=[f.data,f.tipo,f.resultado,f.resp,f.obs].join('|'); if(seen.has(k)) return false; seen.add(k); return true;});
    followups[id]=base.concat(add);
  });
  const merged={
    followups,
    agendamentos:{...((payloadRemoto&&payloadRemoto.agendamentos)||{}),...(S.agendamentos||{})},
    reativados:{...((payloadRemoto&&payloadRemoto.reativados)||{}),...(S.reativados||{})},
    importedAt:new Date().toISOString()
  };
  await remoteSaveFile(merged,'Importa follow-ups locais para base central');
  mergeRemotePayload(merged);
  saveLS();
  if(typeof toast==='function')toast('Dados locais importados para Google Sheets');
}


async function decompress(b64){
  const bin=atob(b64);const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip');const writer=ds.writable.getWriter();
  writer.write(bytes);writer.close();
  const reader=ds.readable.getReader();const chunks=[];
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
  const total=chunks.reduce((a,c)=>a+c.length,0);const out=new Uint8Array(total);
  let offset=0;for(const c of chunks){out.set(c,offset);offset+=c.length;}
  return JSON.parse(new TextDecoder().decode(out));
}

function fmtR(v){return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtData(s){if(!s)return '–';const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;}
function proxData(){const d=new Date();d.setDate(d.getDate()+7);return d.toISOString().split('T')[0];}

const LS_KEY='reativ_sup_v3';
function saveLS(){try{localStorage.setItem(LS_KEY,JSON.stringify({followups:S.followups||{},agendamentos:S.agendamentos||{},reativados:S.reativados||{}}));}catch(e){}}
function loadLS(){try{const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');S.followups=d.followups||{};S.agendamentos=d.agendamentos||{};S.reativados=d.reativados||{};}catch(e){S.followups={};S.agendamentos={};S.reativados={};}}

function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',2800);}
function getSupervisores(){return[...new Set(S.clientes.map(c=>c.supervisor).filter(s=>s&&s!=='Outros'))].sort();}
function getInativos(){return S.clientes.filter(c=>!S.reativados[c.id]);}
function getReativados(){return S.clientes.filter(c=>!!S.reativados[c.id]);}

function updateTabCounts(){
  const ni=getInativos().length,nr=getReativados().length;
  document.getElementById('tc-inativos').textContent=ni;
  document.getElementById('tc-reativados').textContent=nr;
  document.getElementById('tn').textContent=ni.toLocaleString('pt-BR');
  document.getElementById('tr').textContent=nr.toLocaleString('pt-BR');
  document.getElementById('tab-inativos').className='tab-btn'+(S.aba==='inativos'?' ativo':'');
  document.getElementById('tab-reativados').className='tab-btn verde'+(S.aba==='reativados'?' ativo':'');
}

function applyFilters(lista){
  if(S.supervisor!=='todos')lista=lista.filter(c=>c.supervisor===S.supervisor);
  if(S.grupo!=='todos')lista=lista.filter(c=>c.grupo===S.grupo);
  if(S.busca){const q=S.busca.toLowerCase();lista=lista.filter(c=>c.nome.toLowerCase().includes(q)||(c.fantasia||'').toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||c.uf.toLowerCase().includes(q)||c.vendedor.toLowerCase().includes(q));}
  return lista;
}

function render(){
  updateTabCounts();
  if(S.aberto){renderModal(S.aberto);return;}
  document.getElementById('ov').className='';
  const sups=getSupervisores();
  if(S.aba==='inativos')renderInativos(sups);else renderReativados(sups);
}

const CAT_COLORS=['#339af0','#51cf66','#fcc419','#f06595','#20c997','#ff8787','#a9e34b','#748ffc'];

function renderMixCats(cats){
  if(!cats||cats.length===0)return '<div class="fu-empty">Sem dados de categorias</div>';
  const topCat=cats[0];
  // donut
  let donutSegs='';
  let offset=25;
  cats.forEach((c,i)=>{
    const len=c.pct*0.75;
    donutSegs+=`<circle cx="20" cy="20" r="12" fill="none" stroke="${CAT_COLORS[i%CAT_COLORS.length]}" stroke-width="8" stroke-dasharray="${len} ${75-len}" stroke-dashoffset="${-offset}" />`;
    offset-=len;
  });
  const bars=cats.map((c,i)=>`
    <div class="mix-bar-row">
      <div class="mix-bar-label"><span>${c.emoji} ${c.cat}</span><span class="pct">${c.pct}%</span></div>
      <div class="mix-bar-track"><div class="mix-bar-fill" style="width:${c.pct}%;background:${CAT_COLORS[i%CAT_COLORS.length]}"></div></div>
    </div>`).join('');
  return `
    <div class="mix-grid">
      <div class="mix-bars">${bars}</div>
      <div class="mix-donut">
        <svg viewBox="0 0 40 40" width="90" height="90">${donutSegs}</svg>
        <div class="mix-donut-lbl">Distribuição</div>
      </div>
    </div>
    <div class="mix-sugestao">💡 <strong>Sugestão:</strong> Este cliente foca em ${topCat.emoji} <strong>${topCat.cat}</strong>. Priorize esta categoria na abordagem.</div>`;
}

              </div>
            </div>
            <div class="form-full"><label>Observações</label><textarea id="fo" rows="3" placeholder="Descreva o contato..." oninput="saveFormState()">${fs.obs||''}</textarea></div>
            <div class="form-grid-2">
              <div><label>Responsável</label><input type="text" id="fre" oninput="saveFormState()" placeholder="Seu nome" value="${fs.resp||''}"></div>
              <div></div>
            </div>
            <div class="form-grid-2" style="margin-bottom:8px">
              <div><label>Agendar Próximo Contato</label><input type="date" id="fdp" oninput="saveFormState()" value="${fs.dp||proxData()}"></div>
              <div><label>Canal</label>
                <select id="fcp" onchange="saveFormState()">
                  <option>WhatsApp</option><option>Ligação</option><option>E-mail</option><option>Visita</option>
                </select>
              </div>
            </div>
            <button class="btn-primary" style="width:100%" onclick="salvarFU('${c.id}')">💾 Salvar Contato</button>
          </div>
        </div>
      </div>

      <!-- PRÓXIMO CONTATO -->
      <div>
        <div class="bloco-titulo">
          <div class="bloco-icon">📅</div><div class="bloco-nome">Próximo Contato Agendado</div><div class="bloco-rule"></div>
        </div>
        <div class="followup-section">
          ${ag?`
            <div style="background:var(--card2);border:1px solid var(--azul);border-radius:10px;padding:14px 18px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--azul)">Agendamento Ativo</span>
                <button class="btn-rm" onclick="rmAgend('${c.id}')">🗑️ Remover</button>
              </div>
              <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--text);margin-bottom:4px">📅 ${fmtData(ag.data)}</div>
              <div style="font-size:12px;color:var(--text3)">Canal: <strong>${ag.canal}</strong> · Responsável: <strong>${ag.resp||'–'}</strong></div>
            </div>`
            :`<div class="fu-empty">📭 Nenhum agendamento ativo</div>`}
        </div>
      </div>

      <!-- REATIVAÇÃO -->
      <div>
        <div class="bloco-titulo">
          <div class="bloco-icon">🎯</div><div class="bloco-nome">Marcar Reativação</div><div class="bloco-rule"></div>
        </div>
        ${!isReativado?`
          <div class="reativ-form">
            <div class="form-grid-2">
              <div><label>Data da Compra (pós-reativação)</label><input type="date" id="frd" value="${new Date().toISOString().split('T')[0]}"></div>
              <div style="display:flex;align-items:flex-end">
                <button class="btn-primary" style="background:var(--verde);width:100%" onclick="marcarReativado('${c.id}')">✅ Confirmar Reativação</button>
              </div>
            </div>
            <div style="margin-top:10px"><label>Observação (opcional)</label><input type="text" id="fro" placeholder="Ex: Pedido #12345 realizado"></div>
          </div>`
          :`<div style="text-align:center;padding:12px;color:var(--verde);font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:15px">✅ Cliente já marcado como reativado — <a href="javascript:void(0)" onclick="desfazerReativacao('${c.id}')" style="color:var(--vermelho)">Desfazer</a></div>`}
      </div>

      <!-- MENSAGEM -->
      <div>
        <div class="bloco-titulo">
          <div class="bloco-icon">💬</div><div class="bloco-nome">Mensagem de Reativação</div><div class="bloco-rule"></div>
        </div>
        <div id="msgbox" class="msg-box">${msg}</div>
        <div class="btns-row" style="margin-top:10px">
          <button class="btn-outline" id="bcopy" onclick="copiarMsg()">📋 Copiar Mensagem</button>
          ${c.telefone
            ?`<button class="btn-wpp" onclick="window.open('https://wa.me/55${c.telefone}?text='+encodeURIComponent(document.getElementById('msgbox').innerText),'_blank')">💬 Abrir no WhatsApp</button>`
            :`<button class="btn-wpp" style="opacity:0.4;cursor:not-allowed">💬 Sem número</button>`}
        </div>
      </div>

    </div>`;

  if(fs.tipo){const el=document.getElementById('ft');if(el)for(let i=0;i<el.options.length;i++)if(el.options[i].text===fs.tipo){el.selectedIndex=i;break;}}
  if(fs.res){const el=document.getElementById('fr');if(el)for(let i=0;i<el.options.length;i++)if(el.options[i].value===fs.res){el.selectedIndex=i;break;}}
  if(fs.cp){const el=document.getElementById('fcp');if(el)for(let i=0;i<el.options.length;i++)if(el.options[i].text===fs.cp){el.selectedIndex=i;break;}}
}

function abrirCliente(id){S.aberto=S.clientes.find(c=>c.id===id);renderModal(S.aberto);window.scrollTo(0,0);}
function fecharModal(){S.aberto=null;S._formState=null;document.getElementById('ov').className='';}

function salvarFU(id){
  const obs=document.getElementById('fo').value.trim();
  if(!obs){showToast('⚠️ Preencha as observações!','err');return;}
  const tipo=document.getElementById('ft').value,res=document.getElementById('fr').value,resp=document.getElementById('fre').value.trim(),dp=document.getElementById('fdp').value,cp=document.getElementById('fcp').value;
  const fu={data:new Date().toLocaleDateString('pt-BR'),tipo,obs,resultado:res,resp};
  if(!S.followups[id])S.followups[id]=[];
  S.followups[id].push(fu);
  if(dp)S.agendamentos[id]={data:dp,canal:cp,resp};
  S._formState=null;saveLS();
  showToast('✅ Contato salvo!','ok');
  S.aberto=S.clientes.find(c=>c.id===id);renderModal(S.aberto);
}

function marcarReativado(id){
  const data=document.getElementById('frd').value;
  const obs=(document.getElementById('fro')||{}).value||'';
  if(!data){showToast('⚠️ Informe a data da compra!','err');return;}
  S.reativados[id]={data_reativacao:data,obs};
  saveLS();showToast('🎉 Cliente marcado como reativado!','ok');
  S.aberto=S.clientes.find(c=>c.id===id);renderModal(S.aberto);updateTabCounts();
}

function desfazerReativacao(id){
  if(!confirm('Desfazer reativação? O cliente voltará para a lista de inativos.'))return;
  delete S.reativados[id];saveLS();showToast('↩ Reativação desfeita.','ok');
  S.aberto=S.clientes.find(c=>c.id===id);renderModal(S.aberto);updateTabCounts();
}

function rmAgend(id){if(!confirm('Remover agendamento?'))return;delete S.agendamentos[id];saveLS();if(REMOTE_CFG.token) syncToCloud(false).catch(()=>{});renderModal(S.aberto);}

function copiarMsg(){
  const txt=document.getElementById('msgbox').innerText;
  navigator.clipboard.writeText(txt).then(()=>{const b=document.getElementById('bcopy');b.textContent='✅ Copiado!';setTimeout(()=>b.textContent='📋 Copiar Mensagem',2000);});
}

function onBuscaInput(el){
  S.busca=el.value;const pos=el.selectionStart;render();
  const si=document.getElementById('si');if(si){si.focus();try{si.setSelectionRange(pos,pos);}catch(e){}}
}

function saveFormState(){
  S._formState={
    obs:(document.getElementById('fo')||{}).value||'',tipo:(document.getElementById('ft')||{}).value||'',
    res:(document.getElementById('fr')||{}).value||'',resp:(document.getElementById('fre')||{}).value||'',
    dp:(document.getElementById('fdp')||{}).value||'',cp:(document.getElementById('fcp')||{}).value||''
  };
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.aberto)fecharModal();});

window.abrirCliente=abrirCliente;window.fecharModal=fecharModal;window.salvarFU=salvarFU;
window.rmAgend=rmAgend;window.copiarMsg=copiarMsg;window.onBuscaInput=onBuscaInput;
window.saveFormState=saveFormState;window.marcarReativado=marcarReativado;window.desfazerReativacao=desfazerReativacao;

async function init(){
  loadLS();
  try{
    const usarRemoto=confirm('Deseja carregar a base central do GitHub agora?');
    if(usarRemoto){
      if(!REMOTE_CFG.token) setRemoteToken();
      if(REMOTE_CFG.token) await loadFromCloud();
    }
  }catch(e){}
  const data=await decompress(B64);
  S.clientes=data;
  document.getElementById('main').innerHTML='';
  render();
  setTimeout(()=>{
    const b1=document.getElementById('btnSyncCloud');
    const b2=document.getElementById('btnImportarLocais');
    const b3=document.getElementById('btnExportarFollows');
    if(b1)b1.onclick=()=>syncToCloud(true).catch(e=>alert('Erro ao sincronizar: '+e.message));
    if(b2)b2.onclick=()=>importarLocalParaCloud().catch(e=>alert('Erro ao importar: '+e.message));
    if(b3)b3.onclick=()=>exportFollowupsJSON();
  },0);
}
init();
</script>
</body>
</html>
